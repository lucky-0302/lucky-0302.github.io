<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A letter to Lucky</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Pretendard', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            background: #161b22; 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid #30363d; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
        }
        h1 { font-size: 1.8rem; color: #58a6ff; margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #8b949e; margin-bottom: 30px; }
        
        /* 편지 쓰기 버튼 */
        .btn-link {
            display: block;
            padding: 16px;
            background: #238636;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-bottom: 40px;
        }
        .btn-link:hover { background: #2ea043; transform: scale(1.02); }

        /* 명단 섹션 */
        .list-section {
            border-top: 1px solid #30363d;
            padding-top: 30px;
            text-align: left;
        }
        .list-title {
            font-size: 1rem;
            color: #f0f6fc;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .name-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            padding: 0;
        }
        .name-item {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #c9d1d9;
        }
        .footer { margin-top: 30px; font-size: 0.8rem; color: #484f58; }
    </style>
</head>
<body>
    <div class="container">
        <h1>A letter to Lucky!</h1>
        <p class="subtitle">아래 버튼을 눌러서 럭키에게 편지를 남겨주세요!</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeRVkCm8Ay0suTV6912Vf8wBW3klL8pTjfp1qFLnwTtrLdZUw/viewform" class="btn-link" target="_blank">
            📩 편지 쓰러 가기
        </a>

        <div class="list-section">
            <div class="list-title">✨ 편지를 보내준 분들</div>
            <ul class="name-list">
                <li class="name-item">루비</li>
                <li class="name-item">라떼</li>
                <li class="name-item">하린</li>
                </ul>
        </div>

        <div class="footer">© 2026 lucky-0302. Built with heart.</div>
    </div>
</body>
</html>
