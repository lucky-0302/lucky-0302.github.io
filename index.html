<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A letter to Lucky</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Pretendard', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            background: #161b22; 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid #30363d; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
        }
        h1 { font-size: 1.8rem; color: #58a6ff; margin-bottom: 10px; text-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }
        .subtitle { font-size: 0.9rem; color: #8b949e; margin-bottom: 30px; }
        
        /* 편지 쓰기 버튼 */
        .btn-link {
            display: block;
            padding: 16px;
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3);
        }
        .btn-link:hover { 
            background: linear-gradient(135deg, #2ea043 0%, #3fb950 100%);
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(46, 160, 67, 0.4);
        }

        /* 명단 섹션 디자인 강화 */
        .list-section {
            border-top: 1px solid #30363d;
            padding-top: 30px;
            text-align: left;
        }
        .list-title {
            font-size: 1rem;
            color: #f0f6fc;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        .name-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            list-style: none;
            padding: 0;
        }
        
        /* 이름 아이템: 네온 효과 및 애니메이션 추가 */
        .name-item {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: #58a6ff;
            font-weight: 500;
            transition: 0.3s;
            cursor: default;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .name-item:hover {
            background: #58a6ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.5);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #484f58; }
    </style>
</head>
<body>
    <div class="container">
        <h1>A letter to Lucky!</h1>
        <p class="subtitle">아래 버튼을 눌러서 럭키에게 편지를 남겨주세요!</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeRVkCm8Ay0suTV6912Vf8wBW3klL8pTjfp1qFLnwTtrLdZUw/viewform" class="btn-link" target="_blank">
            📩 편지 쓰러 가기
        </a>

        <div class="list-section">
            <div class="list-title">✨ 편지를 보내준 고마운 분들</div>
            <ul class="name-list">
                <li class="name-item">루비</li>
                <li class="name-item">라떼</li>
                <li class="name-item">하린</li>
                </ul>
        </div>

        <div class="footer">© 2026 lucky-0302. Built with heart.</div>
    </div>
</body>
</html>
