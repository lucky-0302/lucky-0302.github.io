<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나만의 비밀 우체통</title>
    <style>
        body { background-color: #121212; color: #00ff88; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #00ff88; padding: 20px; display: inline-block; border-radius: 15px; }
        input, textarea { width: 90%; margin: 10px 0; padding: 10px; background: #222; border: 1px solid #444; color: white; }
        button { background: #00ff88; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📬 비밀 편지함</h1>
        <p>내용은 나만 볼 수 있어!</p>
        <form>
            <input type="text" placeholder="이름 또는 활동명"><br>
            <input type="text" placeholder="나를 알게 된 계기"><br>
            <input type="text" placeholder="우리 친밀도는?"><br>
            <textarea rows="5" placeholder="하고 싶은 말"></textarea><br>
            <button type="button">편지 보내기 (연결 전)</button>
        </form>
    </div>
</body>
</html>
